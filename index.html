<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Elementra</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      touch-action: none; /* prevent scroll/zoom on touch */
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      position: fixed; /* prevents iOS rubber-band scroll */
      background: #0d0d1a;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { display: block; }

    /* landscape warning — only on small-height landscape (real phones) */
    #landscape-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      color: #fff;
      font-family: sans-serif;
      font-size: 22px;
      text-align: center;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      z-index: 999;
    }
    @media (orientation: landscape) and (max-height: 450px) {
      #landscape-hint { display: flex; }
    }
  </style>
</head>
<body>
  <div id="landscape-hint">
    <span style="font-size:48px">📱</span>
    <p>Bitte Gerät<br>hochkant halten</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
