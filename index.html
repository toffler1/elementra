<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Elementra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      touch-action: none; /* prevent scroll/zoom on touch */
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      position: fixed; /* prevents iOS rubber-band scroll */
      background: #0d0d1a;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { display: block; }

    /* landscape warning — only on small-height landscape (real phones) */
    #landscape-hint {
      display: none;
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      color: #fff;
      font-family: sans-serif;
      font-size: 22px;
      text-align: center;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
      z-index: 999;
    }
    @media (orientation: landscape) and (max-height: 450px) {
      #landscape-hint { display: flex; }
    }
  </style>
</head>
<body>
  <div id="landscape-hint">
    <span style="font-size:48px">📱</span>
    <p>Please rotate<br>your device</p>
  </div>
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <!-- GameDistribution SDK — GD_OPTIONS must be set before the script loads -->
  <script>
    window.GD_OPTIONS = {
      gameId: "7f45ecbc5a914d518091cdcac763fc08",
      onEvent: function(event) {
        if (event.name === 'SDK_GAME_PAUSE') {
          window.__gdPause && window.__gdPause();
        } else if (event.name === 'SDK_GAME_START') {
          window.__gdResume && window.__gdResume();
        }
      }
    };
  </script>
  <script src="https://html5.api.gamedistribution.com/main.min.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
